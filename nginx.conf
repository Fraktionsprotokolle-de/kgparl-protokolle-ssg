worker_processes auto;

events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html index.htm;

        # --- Legacy URL compatibility ---

        # /gnd/118629972 → /gnd.html?id=118629972 (internal rewrite, URL stays)
        location ~ ^/gnd/(.+)$ {
            rewrite ^/gnd/(.+)$ /gnd.html?id=$1 last;
        }

        # /person.html?id=SchmidCarlo_1949-09-07 → /SchmidCarlo_1949-09-07.html (redirect)
        location = /person.html {
            if ($arg_id) {
                return 301 /$arg_id.html;
            }
            try_files $uri =404;
        }

        # /Protokoll.xml → serve /Protokoll.html (internal rewrite, URL keeps .xml)
        # Exclude /downloads/*.xml which should serve actual XML files
        location ~ ^/(?!downloads/)(.+)\.xml$ {
            try_files /$1.html =404;
        }

        # --- Basic Auth (optional, comment out for public access) ---
        # auth_basic "Restricted";
        # auth_basic_user_file /etc/nginx/.htpasswd;

        # --- Default ---
        location / {
            try_files $uri $uri.html $uri/ =404;
        }

        # Custom 404 page
        error_page 404 /404.html;
        location = /404.html {
            internal;
        }
    }
}
